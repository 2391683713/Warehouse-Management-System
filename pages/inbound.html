<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库管理系统 - 入库管理</title>
    <link rel="stylesheet" href="../css/common.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>仓库管理系统</h2>
            <ul>
                <li id="menu-home"><a href="../index.html">首页</a></li>
                <li id="menu-product"><a href="product.html">商品管理</a></li>
                <li id="menu-inbound" class="active"><a href="inbound.html">入库管理</a></li>
                <li id="menu-outbound"><a href="outbound.html">出库管理</a></li>
                <li id="menu-inventory"><a href="inventory.html">库存查询</a></li>
                <li id="menu-logout" style="margin-top: 30px;"><a href="javascript:logout()">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="page-header">
                <h1>入库管理</h1>
            </div>
            
            <div class="card">
                <div class="search-bar">
                    <button class="btn btn-success" onclick="showAddModal()">+ 新增入库</button>
                </div>
                
                <table id="inboundTable">
                    <thead>
                        <tr>
                            <th width="120">入库单号</th>
                            <th>商品名称</th>
                            <th width="100">入库数量</th>
                            <th width="100">操作人</th>
                            <th width="160">入库时间</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="6" style="text-align: center; color: #909399; padding: 40px 0;">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- 新增入库弹窗 -->
    <div id="inboundModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 30px; border-radius: 8px; width: 450px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
            <h3 style="margin-bottom: 20px; color: #303133;">新加入库</h3>
            <form id="inboundForm">
                <div class="form-item">
                    <label>选择商品 <span style="color: #f56c6c;">*</span></label>
                    <select id="inboundProduct" required style="height: 38px;">
                        <option value="">请选择商品</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>入库数量 <span style="color: #f56c6c;">*</span></label>
                    <input type="number" id="inboundQuantity" min="1" value="1" required style="height: 38px;">
                </div>
                <div class="form-item">
                    <label>操作人</label>
                    <input type="text" id="inboundOperator" placeholder="请输入操作人" style="height: 38px;">
                </div>
                <div class="form-item">
                    <label>备注</label>
                    <textarea id="inboundRemark" rows="3" placeholder="请输入备注（选填）"></textarea>
                </div>
                <div style="text-align: right; margin-top: 25px;">
                    <button type="button" class="btn" onclick="closeModal()" style="padding: 8px 20px;">取消</button>
                    <button type="submit" class="btn btn-primary" style="padding: 8px 20px;">确认入库</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script>
        function checkLogin() {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                window.location.href = '../login.html';
            }
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../login.html';
        }
        
        // 加载入库记录
        async function loadInboundRecords() {
            const result = await API.inbound.getList();
            
            if (result.success) {
                const records = result.data;
                const tbody = document.querySelector('#inboundTable tbody');
                
                if (records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #909399; padding: 40px 0;">暂无数据</td></tr>';
                    return;
                }
                
                tbody.innerHTML = records.map(function(r) {
                    return '<tr>' +
                        '<td>RK' + String(r.id).padStart(4, '0') + '</td>' +
                        '<td>' + (r.product_name || '【已删除商品】') + '</td>' +
                        '<td style="color: #67c23a; font-weight: bold;">+' + r.quantity + '</td>' +
                        '<td>' + (r.operator || '-') + '</td>' +
                        '<td>' + r.create_time + '</td>' +
                        '<td>' + (r.remark || '-') + '</td>' +
                    '</tr>';
                }).join('');
            }
        }
        
        // 加载商品下拉选项
        async function loadProductOptions() {
            const result = await API.products.getList();
            
            if (result.success) {
                const select = document.getElementById('inboundProduct');
                select.innerHTML = '<option value="">请选择商品</option>';
                
                result.data.forEach(function(p) {
                    const option = document.createElement('option');
                    option.value = p.id;
                    option.textContent = p.name + '（库存：' + p.stock + '）';
                    select.appendChild(option);
                });
            }
        }
        
        function showAddModal() {
            loadProductOptions(); // 每次打开都重新加载商品列表
            document.getElementById('inboundQuantity').value = 1;
            document.getElementById('inboundOperator').value = '';
            document.getElementById('inboundRemark').value = '';
            document.getElementById('inboundModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('inboundModal').style.display = 'none';
        }
        
        document.getElementById('inboundModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        document.getElementById('inboundForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const productId = document.getElementById('inboundProduct').value;
            const quantity = parseInt(document.getElementById('inboundQuantity').value);
            const operator = document.getElementById('inboundOperator').value.trim();
            const remark = document.getElementById('inboundRemark').value.trim();
            
            if (!productId) {
                alert('请选择商品');
                return;
            }
            
            if (!quantity || quantity <= 0) {
                alert('请输入有效的入库数量');
                return;
            }
            
            const result = await API.inbound.add({
                product_id: parseInt(productId),
                quantity: quantity,
                operator: operator,
                remark: remark
            });
            
            if (result.success) {
                alert('入库成功');
                closeModal();
                loadInboundRecords();
            } else {
                alert(result.message || '入库失败');
            }
        });
        
        window.onload = function() {
            checkLogin();
            loadInboundRecords();
        };
    </script>
</body>
</html>
