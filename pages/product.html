<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库管理系统 - 商品管理</title>
    <link rel="stylesheet" href="../css/common.css">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <h2>仓库管理系统</h2>
            <ul>
                <li id="menu-home"><a href="../index.html">首页</a></li>
                <li id="menu-product" class="active"><a href="product.html">商品管理</a></li>
                <li id="menu-inbound"><a href="inbound.html">入库管理</a></li>
                <li id="menu-outbound"><a href="outbound.html">出库管理</a></li>
                <li id="menu-inventory"><a href="inventory.html">库存查询</a></li>
                <li id="menu-logout" style="margin-top: 30px;"><a href="javascript:logout()">退出登录</a></li>
            </ul>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <div class="page-header">
                <h1>商品管理</h1>
            </div>
            
            <div class="card">
                <!-- 搜索栏 -->
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="请输入商品名称搜索...">
                    <select id="categoryFilter">
                        <option value="">全部分类</option>
                        <option value="电子产品">电子产品</option>
                        <option value="办公用品">办公用品</option>
                        <option value="办公家具">办公家具</option>
                    </select>
                    <button class="btn btn-primary" onclick="searchProducts()">搜索</button>
                    <button class="btn btn-success" onclick="showAddModal()">+ 新增商品</button>
                </div>
                
                <!-- 商品列表 -->
                <table id="productTable">
                    <thead>
                        <tr>
                            <th>商品ID</th>
                            <th>商品名称</th>
                            <th>分类</th>
                            <th>单位</th>
                            <th>库存数量</th>
                            <th>单价</th>
                            <th>供应商</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 数据由JS填充 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- 新增/编辑弹窗 -->
    <div id="productModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 30px; border-radius: 8px; width: 500px;">
            <h3 id="modalTitle">新增商品</h3>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-item">
                    <label>商品名称</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-item">
                    <label>商品分类</label>
                    <select id="productCategory">
                        <option value="电子产品">电子产品</option>
                        <option value="办公用品">办公用品</option>
                        <option value="办公家具">办公家具</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>单位</label>
                    <input type="text" id="productUnit" value="个">
                </div>
                <div class="form-item">
                    <label>库存数量</label>
                    <input type="number" id="productStock" value="0" min="0">
                </div>
                <div class="form-item">
                    <label>单价</label>
                    <input type="number" id="productPrice" value="0" min="0" step="0.01">
                </div>
                <div class="form-item">
                    <label>供应商</label>
                    <input type="text" id="productSupplier">
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button type="button" class="btn" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">确定</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="../js/common.js"></script>
    <script src="../js/data.js"></script>
    <script>
        // 检查登录
        checkLogin();
        
        // 加载商品列表
        function loadProducts(products) {
            const tbody = document.querySelector('#productTable tbody');
            
            if (!products) {
                products = getProducts();
            }
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #909399;">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>${p.category}</td>
                    <td>${p.unit}</td>
                    <td>${p.stock}</td>
                    <td>¥${p.price}</td>
                    <td>${p.supplier || '-'}</td>
                    <td>
                        <button class="btn btn-warning" onclick="editProduct(${p.id})">编辑</button>
                        <button class="btn btn-danger" onclick="deleteProductConfirm(${p.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // 搜索商品
        function searchProducts() {
            const keyword = document.getElementById('searchInput').value.trim();
            const category = document.getElementById('categoryFilter').value;
            
            let products = getProducts();
            
            if (keyword) {
                products = products.filter(p => p.name.includes(keyword));
            }
            
            if (category) {
                products = products.filter(p => p.category === category);
            }
            
            loadProducts(products);
        }
        
        // 显示新增弹窗
        function showAddModal() {
            document.getElementById('modalTitle').textContent = '新增商品';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productModal').style.display = 'block';
        }
        
        // 编辑商品
        function editProduct(id) {
            const product = getProducts().find(p => p.id === id);
            if (!product) return;
            
            document.getElementById('modalTitle').textContent = '编辑商品';
            document.getElementById('productId').value = product.id;
            document.getElementById('productName').value = product.name;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productUnit').value = product.unit;
            document.getElementById('productStock').value = product.stock;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productSupplier').value = product.supplier || '';
            
            document.getElementById('productModal').style.display = 'block';
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        // 删除确认
        function deleteProductConfirm(id) {
            if (confirm('确定要删除这个商品吗？')) {
                deleteProduct(id);
                loadProducts();
                alert('删除成功');
            }
        }
        
        // 表单提交
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const id = document.getElementById('productId').value;
            const productData = {
                name: document.getElementById('productName').value.trim(),
                category: document.getElementById('productCategory').value,
                unit: document.getElementById('productUnit').value.trim(),
                stock: parseInt(document.getElementById('productStock').value),
                price: parseFloat(document.getElementById('productPrice').value),
                supplier: document.getElementById('productSupplier').value.trim()
            };
            
            if (id) {
                // 编辑
                updateProduct(parseInt(id), productData);
                alert('修改成功');
            } else {
                // 新增
                productData.createTime = new Date().toLocaleString();
                addProduct(productData);
                alert('新增成功');
            }
            
            closeModal();
            loadProducts();
        });
        
        // 页面加载
        window.onload = function() {
            initData();
            loadProducts();
        };
    </script>
</body>
</html>
