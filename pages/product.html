<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库管理系统 - 商品管理</title>
    <link rel="stylesheet" href="../css/common.css">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <h2>仓库管理系统</h2>
            <ul>
                <li id="menu-home"><a href="../index.html">首页</a></li>
                <li id="menu-product" class="active"><a href="product.html">商品管理</a></li>
                <li id="menu-inbound"><a href="inbound.html">入库管理</a></li>
                <li id="menu-outbound"><a href="outbound.html">出库管理</a></li>
                <li id="menu-inventory"><a href="inventory.html">库存查询</a></li>
                <li id="menu-logout" style="margin-top: 30px;"><a href="javascript:logout()">退出登录</a></li>
            </ul>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <div class="page-header">
                <h1>商品管理</h1>
            </div>
            
            <div class="card">
                <!-- 搜索栏 -->
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="请输入商品名称搜索...">
                    <select id="categoryFilter">
                        <option value="">全部分类</option>
                    </select>
                    <button class="btn btn-primary" onclick="searchProducts()">搜索</button>
                    <button class="btn" onclick="resetSearch()">重置</button>
                    <button class="btn btn-success" style="margin-left: auto;" onclick="showAddModal()">+ 新增商品</button>
                </div>
                
                <!-- 商品列表 -->
                <table id="productTable">
                    <thead>
                        <tr>
                            <th width="80">ID</th>
                            <th>商品名称</th>
                            <th width="100">分类</th>
                            <th width="80">单位</th>
                            <th width="100">库存</th>
                            <th width="100">单价</th>
                            <th>供应商</th>
                            <th width="160">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="8" style="text-align: center; color: #909399; padding: 40px 0;">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- 新增/编辑弹窗 -->
    <div id="productModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 30px; border-radius: 8px; width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
            <h3 id="modalTitle" style="margin-bottom: 20px; color: #303133;">新增商品</h3>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-item">
                    <label>商品名称 <span style="color: #f56c6c;">*</span></label>
                    <input type="text" id="productName" required style="height: 38px;">
                </div>
                <div class="form-item">
                    <label>分类</label>
                    <input type="text" id="productCategory" placeholder="如：电子产品、办公用品" style="height: 38px;">
                </div>
                <div class="form-item">
                    <label>单位</label>
                    <input type="text" id="productUnit" value="个" style="height: 38px;">
                </div>
                <div class="form-item">
                    <label>库存数量</label>
                    <input type="number" id="productStock" value="0" min="0" style="height: 38px;">
                </div>
                <div class="form-item">
                    <label>单价</label>
                    <input type="number" id="productPrice" value="0" min="0" step="0.01" style="height: 38px;">
                </div>
                <div class="form-item">
                    <label>供应商</label>
                    <input type="text" id="productSupplier" placeholder="请输入供应商（选填）" style="height: 38px;">
                </div>
                <div style="text-align: right; margin-top: 25px;">
                    <button type="button" class="btn" onclick="closeModal()" style="padding: 8px 20px;">取消</button>
                    <button type="submit" class="btn btn-primary" style="padding: 8px 20px;">确定</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script>
        // 检查登录
        function checkLogin() {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                window.location.href = '../login.html';
            }
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../login.html';
        }
        
        // 加载分类选项
        async function loadCategories() {
            const result = await API.products.getCategories();
            if (result.success) {
                const select = document.getElementById('categoryFilter');
                result.data.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    select.appendChild(option);
                });
            }
        }
        
        // 加载商品列表
        async function loadProducts(params) {
            const result = await API.products.getList(params);
            
            if (result.success) {
                const products = result.data;
                const tbody = document.querySelector('#productTable tbody');
                
                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #909399; padding: 40px 0;">暂无数据</td></tr>';
                    return;
                }
                
                tbody.innerHTML = products.map(function(p) {
                    return '<tr>' +
                        '<td>' + p.id + '</td>' +
                        '<td>' + p.name + '</td>' +
                        '<td>' + p.category + '</td>' +
                        '<td>' + p.unit + '</td>' +
                        '<td>' + p.stock + '</td>' +
                        '<td>¥' + p.price + '</td>' +
                        '<td>' + (p.supplier || '-') + '</td>' +
                        '<td>' +
                            '<button class="btn btn-warning" onclick="editProduct(' + p.id + ')">编辑</button> ' +
                            '<button class="btn btn-danger" onclick="deleteProductConfirm(' + p.id + ')">删除</button>' +
                        '</td>' +
                    '</tr>';
                }).join('');
            }
        }
        
        // 搜索
        function searchProducts() {
            const keyword = document.getElementById('searchInput').value.trim();
            const category = document.getElementById('categoryFilter').value;
            loadProducts({ keyword: keyword, category: category });
        }
        
        // 重置搜索
        function resetSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            loadProducts();
        }
        
        // 显示新增弹窗
        function showAddModal() {
            document.getElementById('modalTitle').textContent = '新增商品';
            document.getElementById('productId').value = '';
            document.getElementById('productForm').reset();
            document.getElementById('productUnit').value = '个';
            document.getElementById('productStock').value = '0';
            document.getElementById('productPrice').value = '0';
            document.getElementById('productModal').style.display = 'block';
        }
        
        // 显示编辑弹窗
        async function editProduct(id) {
            const result = await API.products.getDetail(id);
            if (result.success) {
                const p = result.data;
                document.getElementById('modalTitle').textContent = '编辑商品';
                document.getElementById('productId').value = p.id;
                document.getElementById('productName').value = p.name;
                document.getElementById('productCategory').value = p.category || '';
                document.getElementById('productUnit').value = p.unit || '个';
                document.getElementById('productStock').value = p.stock || 0;
                document.getElementById('productPrice').value = p.price || 0;
                document.getElementById('productSupplier').value = p.supplier || '';
                document.getElementById('productModal').style.display = 'block';
            }
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        // 点击弹窗外部关闭
        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // 表单提交
        document.getElementById('productForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const id = document.getElementById('productId').value;
            const data = {
                name: document.getElementById('productName').value.trim(),
                category: document.getElementById('productCategory').value.trim(),
                unit: document.getElementById('productUnit').value.trim(),
                stock: parseInt(document.getElementById('productStock').value) || 0,
                price: parseFloat(document.getElementById('productPrice').value) || 0,
                supplier: document.getElementById('productSupplier').value.trim()
            };
            
            if (!data.name) {
                alert('请输入商品名称');
                return;
            }
            
            let result;
            if (id) {
                // 编辑
                result = await API.products.update(id, data);
            } else {
                // 新增
                result = await API.products.add(data);
            }
            
            if (result.success) {
                alert(result.message || '操作成功');
                closeModal();
                loadProducts();
                loadCategories();
            } else {
                alert(result.message || '操作失败');
            }
        });
        
        // 删除确认
        async function deleteProductConfirm(id) {
            if (confirm('确定要删除这个商品吗？')) {
                const result = await API.products.delete(id);
                if (result.success) {
                    alert('删除成功');
                    loadProducts();
                } else {
                    alert(result.message || '删除失败');
                }
            }
        }
        
        // 回车搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchProducts();
            }
        });
        
        // 页面加载
        window.onload = function() {
            checkLogin();
            loadCategories();
            loadProducts();
        };
    </script>
</body>
</html>
