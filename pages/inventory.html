<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库管理系统 - 库存查询</title>
    <link rel="stylesheet" href="../css/common.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>仓库管理系统</h2>
            <ul>
                <li id="menu-home"><a href="../index.html">首页</a></li>
                <li id="menu-product"><a href="product.html">商品管理</a></li>
                <li id="menu-inbound"><a href="inbound.html">入库管理</a></li>
                <li id="menu-outbound"><a href="outbound.html">出库管理</a></li>
                <li id="menu-inventory" class="active"><a href="inventory.html">库存查询</a></li>
                <li id="menu-logout" style="margin-top: 30px;"><a href="javascript:logout()">退出登录</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="page-header">
                <h1>库存查询</h1>
            </div>
            
            <div class="card">
                <!-- 搜索栏 -->
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="请输入商品名称搜索...">
                    <select id="categoryFilter">
                        <option value="">全部分类</option>
                    </select>
                    <select id="statusFilter">
                        <option value="">全部库存</option>
                        <option value="low">库存不足</option>
                        <option value="normal">库存正常</option>
                        <option value="high">库存充足</option>
                    </select>
                    <button class="btn btn-primary" onclick="searchInventory()">搜索</button>
                    <button class="btn" onclick="resetSearch()">重置</button>
                </div>
                
                <!-- 统计信息 -->
                <div class="stats-bar" style="display: flex; gap: 30px; margin-bottom: 20px; padding: 15px; background: #f5f7fa; border-radius: 4px;">
                    <div>商品总数：<span id="totalProducts" style="font-weight: bold; color: #409eff;">0</span> 种</div>
                    <div>库存总量：<span id="totalStock" style="font-weight: bold; color: #67c23a;">0</span> 件</div>
                    <div>库存预警：<span id="warningCount" style="font-weight: bold; color: #f56c6c;">0</span> 种</div>
                </div>
                
                <!-- 库存列表 -->
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th width="100">商品ID</th>
                            <th>商品名称</th>
                            <th width="100">分类</th>
                            <th width="80">单位</th>
                            <th width="100">库存数量</th>
                            <th width="100">单价</th>
                            <th width="100">库存状态</th>
                            <th>供应商</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="8" style="text-align: center; color: #909399; padding: 40px 0;">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="../js/api.js"></script>
    <script>
        const LOW_STOCK = 10;   // 库存不足阈值
        const HIGH_STOCK = 100; // 库存充足阈值
        
        function checkLogin() {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                window.location.href = '../login.html';
            }
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../login.html';
        }
        
        // 获取库存状态
        function getStockStatus(stock) {
            if (stock < LOW_STOCK) {
                return { text: '库存不足', class: 'status-danger' };
            } else if (stock > HIGH_STOCK) {
                return { text: '库存充足', class: 'status-success' };
            } else {
                return { text: '库存正常', class: 'status-warning' };
            }
        }
        
        // 加载分类选项
        async function loadCategories() {
            const result = await API.products.getCategories();
            if (result.success) {
                const select = document.getElementById('categoryFilter');
                result.data.forEach(function(cat) {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    select.appendChild(option);
                });
            }
        }
        
        // 加载库存数据
        async function loadInventory(params) {
            const result = await API.products.getList(params);
            
            if (result.success) {
                let products = result.data;
                
                // 按库存状态筛选
                const statusFilter = document.getElementById('statusFilter').value;
                if (statusFilter) {
                    products = products.filter(function(p) {
                        if (statusFilter === 'low') return p.stock < LOW_STOCK;
                        if (statusFilter === 'high') return p.stock > HIGH_STOCK;
                        return p.stock >= LOW_STOCK && p.stock <= HIGH_STOCK;
                    });
                }
                
                // 更新统计
                const totalProducts = products.length;
                const totalStock = products.reduce(function(sum, p) {
                    return sum + p.stock;
                }, 0);
                const warningCount = products.filter(function(p) {
                    return p.stock < LOW_STOCK;
                }).length;
                
                document.getElementById('totalProducts').textContent = totalProducts;
                document.getElementById('totalStock').textContent = totalStock;
                document.getElementById('warningCount').textContent = warningCount;
                
                // 更新表格
                const tbody = document.querySelector('#inventoryTable tbody');
                
                if (products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; color: #909399; padding: 40px 0;">暂无数据</td></tr>';
                    return;
                }
                
                tbody.innerHTML = products.map(function(p) {
                    const status = getStockStatus(p.stock);
                    return '<tr>' +
                        '<td>' + String(p.id).padStart(4, '0') + '</td>' +
                        '<td>' + p.name + '</td>' +
                        '<td>' + p.category + '</td>' +
                        '<td>' + p.unit + '</td>' +
                        '<td>' + p.stock + '</td>' +
                        '<td>¥' + p.price + '</td>' +
                        '<td><span class="status-tag ' + status.class + '">' + status.text + '</span></td>' +
                        '<td>' + (p.supplier || '-') + '</td>' +
                    '</tr>';
                }).join('');
            }
        }
        
        function searchInventory() {
            const keyword = document.getElementById('searchInput').value.trim();
            const category = document.getElementById('categoryFilter').value;
            loadInventory({ keyword: keyword, category: category });
        }
        
        function resetSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('statusFilter').value = '';
            loadInventory();
        }
        
        // 状态变化时也重新搜索
        document.getElementById('statusFilter').addEventListener('change', searchInventory);
        
        // 回车搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchInventory();
            }
        });
        
        window.onload = function() {
            checkLogin();
            loadCategories();
            loadInventory();
        };
    </script>
</body>
</html>
